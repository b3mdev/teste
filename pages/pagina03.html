<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Kart - Página 3</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <h1>Reserva de Kart</h1>
    </header>
    <main>
        <div class="progress-indicator">
            <div class="progress-step completed">1. Categoria/Tempo</div>
            <div class="progress-step completed">2. Data/Horário</div>
            <div class="progress-step active">3. Pilotos</div>
            <div class="progress-step">4. Pagamento</div>
            <div class="progress-step">5. Confirmação</div>
        </div>
        <section id="pagina03">
            <h2>Página 3: Dados do Piloto Principal</h2>
            <form id="formPagina03">
                <fieldset>
                    <legend>Informações do Piloto Principal</legend>
                    <div>
                        <label for="nome">Nome Completo:</label>
                        <input type="text" id="nome" name="nome" required>
                    </div>
                    <div>
                        <label for="email">E-mail:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div>
                        <label for="whatsapp">WhatsApp (com DDD):</label>
                        <input type="tel" id="whatsapp" name="whatsapp" placeholder="(XX) XXXXX-XXXX" required>
                    </div>
                    <div>
                        <label for="cpf">CPF:</label>
                        <input type="text" id="cpf" name="cpf" placeholder="XXX.XXX.XXX-XX" required>
                    </div>
                    <div>
                        <!-- Placeholder para reCAPTCHA -->
                        <label>reCAPTCHA:</label>
                        <div id="recaptcha-placeholder" style="width: 304px; height: 78px; background-color: #f9f9f9; border: 1px solid #d3d3d3; border-radius: 3px; display: flex; align-items: center; justify-content: center; text-align: center; color: #555;">
                            Simulação do reCAPTCHA <br> (Não funcional nesta demo)
                        </div>
                    </div>
                </fieldset>

                <section id="pilotosAdicionais" style="margin-top: 30px;">
                    <h3>Adicionar Mais Pilotos (Opcional)</h3>
                    <div id="listaPilotosAdicionais">
                        <!-- Pilotos adicionais serão inseridos aqui -->
                    </div>
                    <button type="button" id="btnAdicionarPiloto">Adicionar outro piloto</button>
                </section>
                <br>
                <button type="button" onclick="window.location.href='pagina02.html'">Anterior</button>
                <button type="submit" id="btnProximaPagina03">Próximo</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 Reserva de Kart</p>
    </footer>
    <script src="../js/scriptP03.js"></script>
</body>
</html>
