<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Kart - Dados do Piloto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <h1>Reserva de Kart</h1>
    </header>
    <main>
        <div class="progress-indicator">
            <div class="progress-step completed">1. Categoria/Tempo</div>
            <div class="progress-step completed">2. Data/Horário</div>
            <div class="progress-step active">3. Pilotos</div>
            <div class="progress-step">4. Pagamento</div>
            <div class="progress-step">5. Confirmação</div>
        </div>
        <section id="pagina03" class="page-container">
            <h2><i class="fas fa-user-edit"></i> Dados dos Pilotos</h2>

            <form id="formPagina03">
                <fieldset class="fieldset-modern">
                    <legend><i class="fas fa-user-shield"></i> Piloto Principal</legend>
                    <div class="form-group">
                        <label for="nome"><i class="fas fa-user"></i> Nome Completo:</label>
                        <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>
                    </div>
                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope"></i> E-mail:</label>
                        <input type="email" id="email" name="email" placeholder="seuemail@exemplo.com" required>
                    </div>
                    <div class="form-group">
                        <label for="whatsapp"><i class="fab fa-whatsapp"></i> WhatsApp:</label>
                        <input type="tel" id="whatsapp" name="whatsapp" placeholder="(XX) XXXXX-XXXX" required>
                    </div>
                    <div class="form-group">
                        <label for="cpf"><i class="fas fa-id-card"></i> CPF:</label>
                        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-shield-alt"></i> reCAPTCHA:</label>
                        <div id="recaptcha-placeholder" class="recaptcha-mock">
                            <i class="fas fa-check-circle"></i> Simulação do reCAPTCHA
                        </div>
                    </div>
                </fieldset>

                <div id="pilotosAdicionaisContainer" class="selection-group">
                    <h3><i class="fas fa-users"></i> Pilotos Adicionais (Opcional)</h3>
                    <div id="listaPilotosAdicionais">
                        <!-- Pilotos adicionais (cards) serão inseridos aqui -->
                    </div>
                    <button type="button" id="btnAdicionarPiloto" class="btn-secondary btn-add-piloto">
                        <i class="fas fa-plus-circle"></i> Adicionar Piloto
                    </button>
                </div>

                <div class="navigation-buttons space-between">
                    <button type="button" id="btnAnteriorPagina03" class="btn-secondary">
                        <i class="fas fa-arrow-left"></i> Voltar
                    </button>
                    <button type="submit" id="btnProximaPagina03" class="btn-primary">
                        Avançar <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 Kart Racing - Todos os direitos reservados.</p>
    </footer>
    <script src="../js/scriptP03.js"></script>
</body>
</html>
