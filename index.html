<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Kart - Categoria e Tempo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Reserva de Kart</h1>
    </header>
    <main>
        <div class="progress-indicator">
            <div class="progress-step active">1. Categoria/Tempo</div>
            <div class="progress-step">2. Data/Horário</div>
            <div class="progress-step">3. Pilotos</div>
            <div class="progress-step">4. Pagamento</div>
            <div class="progress-step">5. Confirmação</div>
        </div>
        <section id="pagina01" class="page-container">
            <h2><i class="fas fa-flag-checkered"></i> Escolha sua Corrida</h2>

            <div id="selecaoCategoria" class="selection-group">
                <h3>Selecione a Categoria do Kart:</h3>
                <div class="categoria-options">
                    <button class="categoria-btn" data-categoria="CADETINHO (5,5HP HONDA)" data-tempos="15min,20min,25min,30min">
                        <i class="fas fa-child fa-2x"></i>
                        <span>CADETINHO</span>
                        <small>5,5HP Honda</small>
                    </button>
                    <button class="categoria-btn" data-categoria="STANDART 6.5 HP Honda" data-tempos="15min,20min,25min,30min">
                        <i class="fas fa-tachometer-alt fa-2x"></i>
                        <span>STANDART</span>
                        <small>6.5 HP Honda</small>
                    </button>
                    <button class="categoria-btn" data-categoria="PREPARADO 8.5 HP Honda" data-tempos="15min,20min,25min,30min">
                        <i class="fas fa-rocket fa-2x"></i>
                        <span>PREPARADO</span>
                        <small>8.5 HP Honda</small>
                    </button>
                    <button class="categoria-btn" data-categoria="13HP HONDA Performance Elevada" data-tempos="15min,20min,25min,30min">
                        <i class="fas fa-bolt fa-2x"></i>
                        <span>13HP HONDA</span>
                        <small>Performance Elevada</small>
                    </button>
                </div>
            </div>

            <div id="selecaoTempo" class="selection-group" style="display: none;">
                <h3><i class="fas fa-stopwatch"></i> Selecione o Tempo de Pista:</h3>
                <div id="opcoesTempo" class="tempo-options">
                    <!-- Opções de tempo (botões) serão carregadas aqui pelo JavaScript -->
                </div>
            </div>

            <div class="navigation-buttons">
                <button id="btnProximaPagina01" class="btn-primary" disabled>
                    Avançar <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 Kart Racing - Todos os direitos reservados.</p>
    </footer>
    <script src="js/scriptP01.js"></script>
</body>
</html>
